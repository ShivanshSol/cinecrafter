<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinecrafter</title>
    <!-- fevicon icon -->
    <link rel="icon" href="../images/icons/fev_icon.png">

    <link rel="stylesheet" href="../styles/auth_cinecrafter.css">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
</head>

<body>

    <img class="logo" src="../images/icons/logo.png" alt="">
    <img class="background" src="../images/background/bg.png" alt="">

    <main>
        <!-- login form -->
        <form id="login-form"> 
            <div class="login">
                <h1>Login</h1>
                <i class="fa-solid fa-xmark" onclick="goTOLanding()" ></i>
                <div class="input">
                    <input type="text" id="login-username-email" placeholder="Username or Email" required>
                    <br>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="button" class="view-password eye1" title="Show Password" onclick="togglePassword('login-password','eye1'),toggleEye('hide-password')"><i class="fa-solid fa-eye"></i></button>
                </div>
                <button class="submit-form" type="submit">Login</button>
                <p id="signup-error"></p>  <!--Error message area -->
                <p>Don't have an account? <a id ="toSignup">Sign up</a></p>
            </div>
        </form>

        <!-- signUp form -->
        <form id="signup-form">
            <div class="signup">
                <h1>Sign up</h1>
                <i class="fa-solid fa-xmark" onclick="goTOLanding()"></i>
                <div class="input">
                    <input type="text" id="signup-username" placeholder="Username" required>
                    <br>
                    <input type="email" id="signup-email" placeholder="Email"  required>
                    <br>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <button type="button" class="view-password eye2" title="Show Password" onclick="togglePassword('signup-password','eye2')"><i class="fa-solid fa-eye"></i></button>
                    <br>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                    <button type="button" class="view-password eye3" title="Show Password" onclick="togglePassword('confirm-password','eye3')"><i class="fa-solid fa-eye"></i></button>
                </div>
                <button class="submit-form" type="submit">Sign up</button>
                <p id="signup-error"></p>  <!--Error message area -->
                <p>Already have an account? <a id ="toLogin">Login</a></p>
            </div>
        </form>

        
    </main>

    <script src="../scripts/auth_cinecrafter.js"></script>
</body>
</html>
